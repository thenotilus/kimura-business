server {
    listen 80;
    server_name localhost;

    root /var/app/kimura-business;
    index index.html;

    # Compression Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Sécurité de base
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Cache pour les ressources statiques (images, polices, css)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|ttf|otf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Gestion des routes (fallback vers index.html pour les SPA, bien que ce soit un site statique ici)
    location / {
        try_files $uri $uri/ =404;
    }

    # Pages d'erreur
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
